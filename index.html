<!doctype html>
<html lang="en">
  <head>
    <script>
      (function() {
        try {
          const originalFetch = window.fetch || globalThis.fetch;
          if (originalFetch) {
            // Shadow any read-only prototype property by defining a writable own property on window and globalThis
            try {
              Object.defineProperty(window, 'fetch', {
                value: originalFetch,
                writable: true,
                configurable: true,
                enumerable: true
              });
            } catch (e) {
              console.warn("Could not define writable fetch on window:", e);
            }

            if (typeof globalThis !== 'undefined' && globalThis !== window) {
              try {
                Object.defineProperty(globalThis, 'fetch', {
                  value: originalFetch,
                  writable: true,
                  configurable: true,
                  enumerable: true
                });
              } catch (e) {
                console.warn("Could not define writable fetch on globalThis:", e);
              }
            }
          }
        } catch (error) {
          console.error("Critical error in fetch fallback initializer:", error);
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>

  </body>
</html>
